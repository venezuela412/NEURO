# Deploy the static miniapp to Cloudflare Pages (free tier).
#
# 1. Cloudflare: Workers & Pages → Create application → Pages → Connect to Git
#    OR use this workflow with wrangler (manual setup below).
#
# 2. GitHub → Settings → Secrets and variables → Actions → New repository secret:
#      CLOUDFLARE_API_TOKEN   — Cloudflare → My Profile → API Tokens (Workers + Pages edit)
#      CLOUDFLARE_ACCOUNT_ID  — Workers & Pages overview → Account ID
#
# 3. GitHub → Settings → Secrets and variables → Actions → Variables:
#      VITE_APP_URL           — Your final Pages URL, e.g. https://neuro-miniapp.pages.dev
#      VITE_CONTROL_PLANE_URL — Optional; public control-plane URL for persistence API
#
# 4. Run: Actions → "Deploy miniapp (Cloudflare Pages)" → Run workflow

name: Deploy miniapp (Cloudflare Pages)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build miniapp
        env:
          VITE_APP_URL: ${{ vars.VITE_APP_URL }}
          VITE_CONTROL_PLANE_URL: ${{ vars.VITE_CONTROL_PLANE_URL }}
        run: pnpm --filter @neuro/miniapp build

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/miniapp/dist --project-name=neuro-miniapp --branch=main
